paths:
  /api/user:
    post:
      summary: Crear cuenta de usuario y su perfil
      tags:
        - Usuarios
      security:
        - bearerAuth: []
      x-code-standards:
        handlerStyle: "arrow-functions"
      x-middlewares:
        - auth
        - access: { permission: "users.create" }
        - parser
        - database
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, profile, roleId]
              properties:
                email: { type: string, format: email }
                phone: { type: string }
                roleId: { type: string, format: uuid }
                organizationId: { type: string, format: uuid, nullable: true }
                venueId: { type: string, format: uuid, nullable: true }
                profile:
                  type: object
                  required: [firstName, lastName, identification]
                  properties:
                    firstName: { type: string }
                    lastName: { type: string }
                    identificationType: { type: string }
                    identification: { type: string }
                    birthDate: { type: string, format: date }
                    countryCode: { type: string }
      responses:
        "201":
          description: Usuario y perfil creados exitosamente
